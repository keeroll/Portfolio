name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js 22 LTS
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: portfolio/package-lock.json
        
    - name: Install dependencies
      run: |
        cd portfolio
        npm ci
        
    - name: Install angular-cli-ghpages
      run: |
        cd portfolio
        npm install -g angular-cli-ghpages
        
    - name: Build for production
      run: |
        cd portfolio
        npm run build:prod
        
    - name: Verify build output
      run: |
        cd portfolio
        ls -la dist/portfolio/
        echo "Checking for index.html..."
        test -f dist/portfolio/index.html && echo "✅ index.html found" || echo "❌ index.html not found"
        
    - name: Configure Git
      run: |
        git config --global user.email "keeroll@users.noreply.github.com"
        git config --global user.name "keeroll"
        
    - name: Deploy to GitHub Pages
      run: |
        cd portfolio
        npx angular-cli-ghpages --dir=dist/portfolio --repo=https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git --branch=gh-pages --no-silent 