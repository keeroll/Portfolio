<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>

    <!-- Handling error page redirects for GitHub Pages -->
    <script>
        const baseHref = '/Portfolio/';
        const currentPath = window.location.pathname;

        if (!currentPath.startsWith(baseHref)) {
            // Edge case — not inside the app folder
            window.location.replace(baseHref);
        } else {
            // Redirect to root with hash or query to preserve deep link (optional)
            window.location.replace(baseHref);
        }
    </script>
</head>

<body>
    <p>Redirecting to error page...</p>
</body>

</html>
